          manifest = json.loads(Path("dist-manifest.json").read_text())
          for artifact in manifest["artifacts"].values():
              if artifact["kind"] == "executable-zip" and "x86_64-apple-darwin" in artifact["target_triples"]:
                  print(artifact["path"])
                  break
          PY
