name: Publish npm package

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-22.04
    steps:
      - name: Download npm package artifact from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "codex-threadripper-npm-package.tar.gz" \
            --dir dist

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        run: |
          npm publish dist/codex-threadripper-npm-package.tar.gz --access public
