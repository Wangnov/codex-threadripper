name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo test --locked
      - run: cargo clippy --locked --all-targets -- -D warnings
      - run: python -m py_compile scripts/smoke_release.py
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node --check scripts/build-npm-matrix.mjs
